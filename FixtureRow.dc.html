<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="{{ wrapStyle }}">
  <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;justify-content:flex-end;text-align:right;">
    <div style="min-width:0;">
      <div style="font-weight:700;font-size:14.5px;line-height:1.25;">{{ homeName }}</div>
      <div style="{{ homeOwnerStyle }}">{{ homeOwner }}</div>
    </div>
    <div style="{{ homeFlag }}"></div>
  </div>

  <div style="flex:none;text-align:center;padding:0 4px;min-width:78px;">
    <div style="font-family:'Anton',sans-serif;font-size:24px;line-height:1;color:{{ scoreColor }};">{{ score }}</div>
    <div style="font-size:9.5px;font-weight:800;letter-spacing:.6px;margin-top:4px;color:{{ statusColor }};">{{ statusLabel }}</div>
  </div>

  <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
    <div style="{{ awayFlag }}"></div>
    <div style="min-width:0;">
      <div style="font-weight:700;font-size:14.5px;line-height:1.25;">{{ awayName }}</div>
      <div style="{{ awayOwnerStyle }}">{{ awayOwner }}</div>
    </div>
  </div>

  <div style="{{ clashStyle }}">{{ clashText }}</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:760,&quot;height&quot;:80},&quot;g&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;object&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const g = this.props.g || {};
    const h = g.home || {}, a = g.away || {};
    const ownerStyle = (c, align) => c
      ? `font-size:11px;font-weight:800;margin-top:2px;color:${c};text-align:${align};white-space:nowrap;`
      : 'display:none;';
    return {
      wrapStyle: `position:relative;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid ${g.clash?'#f2d9a0':'#e3e0d3'};border-radius:13px;padding:13px 16px;${g.clash?'box-shadow:0 0 0 2px rgba(242,183,5,.12);':''}`,
      homeName: h.name, homeFlag: h.flagUrl ? `display:inline-block;width:32px;height:21px;flex:none;border-radius:2px;background:url(${h.flagUrl}) center/cover no-repeat;` : 'display:inline-block;width:32px;height:21px;flex:none;border-radius:2px;background:#d0cfc7;',
      awayName: a.name, awayFlag: a.flagUrl ? `display:inline-block;width:32px;height:21px;flex:none;border-radius:2px;background:url(${a.flagUrl}) center/cover no-repeat;` : 'display:inline-block;width:32px;height:21px;flex:none;border-radius:2px;background:#d0cfc7;',
      homeOwner: h.owner, homeOwnerStyle: ownerStyle(h.ownerColor,'right'),
      awayOwner: a.owner, awayOwnerStyle: ownerStyle(a.ownerColor,'left'),
      score: g.score, scoreColor: g.scoreColor, statusLabel: g.statusLabel, statusColor: g.statusColor,
      clashText: g.clashText,
      clashStyle: g.clash
        ? 'position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:#0a4d2c;color:#f2b705;font-size:10px;font-weight:800;letter-spacing:.4px;padding:2px 9px;border-radius:20px;white-space:nowrap;'
        : 'display:none;',
    };
  }
}
</script>
</body>
</html>
